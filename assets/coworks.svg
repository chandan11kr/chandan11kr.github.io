<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 110">
  <!-- No background - transparent -->

  <!-- "C" circle arc — outer ring (open on right side, mimicking the logo C-shape) -->
  <!-- Outer arc -->
  <path
    d="M 54,18 A 36,36 0 1,0 54,92"
    fill="none"
    stroke="#6a9fc0"
    stroke-width="7"
    stroke-linecap="round"
  />
  <!-- Inner arc (concentric, slightly smaller) -->
  <path
    d="M 50,28 A 24,24 0 1,0 50,82"
    fill="none"
    stroke="#6a9fc0"
    stroke-width="5"
    stroke-linecap="round"
  />

  <!-- "works" text — starts right after the C arc -->
  <text
    x="68"
    y="78"
    font-family="'Arial', sans-serif"
    font-size="56"
    font-weight="300"
    fill="#3a3a3a"
    letter-spacing="-1"
  >works</text>

  <!-- "Grow Together ...." tagline -->
  <text
    x="72"
    y="100"
    font-family="'Georgia', serif"
    font-size="13"
    font-style="italic"
    fill="#888888"
    letter-spacing="0.5"
  >Grow Together ....</text>
</svg>
